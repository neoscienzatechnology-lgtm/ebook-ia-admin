<svg width="1200" height="700" viewBox="0 0 1200 700" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="g1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>
    <linearGradient id="g2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#6d28d9"/>
    </linearGradient>
    <style>
      .t{font:700 34px Inter,Segoe UI,sans-serif;fill:#0f172a}
      .h{font:700 20px Inter,Segoe UI,sans-serif;fill:#fff}
      .p{font:500 14px Inter,Segoe UI,sans-serif;fill:#e2e8f0}
    </style>
  </defs>
  <rect width="1200" height="700" fill="#f8fafc"/>
  <text x="600" y="60" text-anchor="middle" class="t">Mapa de Fundamentos: IA, ML e Deep Learning</text>

  <rect x="140" y="130" width="920" height="130" rx="24" fill="url(#g1)"/>
  <text x="600" y="185" text-anchor="middle" class="h">Inteligencia Artificial (IA)</text>
  <text x="600" y="215" text-anchor="middle" class="p">Conjunto de tecnicas para resolver problemas com comportamento inteligente</text>

  <rect x="220" y="300" width="760" height="130" rx="24" fill="url(#g2)"/>
  <text x="600" y="355" text-anchor="middle" class="h">Machine Learning (ML)</text>
  <text x="600" y="385" text-anchor="middle" class="p">Subconjunto da IA que aprende padroes a partir de dados historicos</text>

  <rect x="320" y="470" width="560" height="130" rx="24" fill="url(#g1)"/>
  <text x="600" y="525" text-anchor="middle" class="h">Deep Learning (DL)</text>
  <text x="600" y="555" text-anchor="middle" class="p">Subconjunto do ML baseado em redes neurais profundas</text>

  <path d="M600 260 L600 300" stroke="#64748b" stroke-width="4" marker-end="url(#m)"/>
  <path d="M600 430 L600 470" stroke="#64748b" stroke-width="4" marker-end="url(#m)"/>
  <defs>
    <marker id="m" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0,10 3,0 6" fill="#64748b"/>
    </marker>
  </defs>
</svg>
