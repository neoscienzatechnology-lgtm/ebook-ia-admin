<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .level-box { stroke-width: 2; }
      .level-1 { fill: #fef2f2; stroke: #fca5a5; }
      .level-2 { fill: #fef3c7; stroke: #fcd34d; }
      .level-3 { fill: #d1fae5; stroke: #6ee7b7; }
      .level-4 { fill: #dbeafe; stroke: #7dd3fc; }
      .level-5 { fill: #ede9fe; stroke: #d8b4fe; }
      .level-title { fill: #0f172a; font-weight: bold; font-size: 13px; }
      .level-desc { fill: #475569; font-size: 11px; }
      .arrow { stroke: #94a3b8; stroke-width: 2; fill: none; marker-end: url(#arrowhead); }
      .title { fill: #0f172a; font-size: 18px; font-weight: bold; }
      .subtitle { fill: #64748b; font-size: 12px; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#94a3b8"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="400" y="30" text-anchor="middle" class="title">Modelo de Maturidade em IA</text>
  <text x="400" y="48" text-anchor="middle" class="subtitle">5 estágios de capacitação corporativa: do piloto ao domínio estratégico</text>

  <!-- Level 1: Ad-hoc -->
  <rect x="20" y="80" width="140" height="120" rx="8" class="level-box level-1"/>
  <text x="90" y="100" text-anchor="middle" class="level-title">Nível 1</text>
  <text x="90" y="115" text-anchor="middle" class="level-title">Ad-hoc</text>
  <line x1="30" y1="125" x2="150" y2="125" stroke="#fca5a5" stroke-width="1"/>
  <text x="90" y="142" text-anchor="middle" class="level-desc">Projetos pontuais</text>
  <text x="90" y="155" text-anchor="middle" class="level-desc">Sem governança</text>
  <text x="90" y="168" text-anchor="middle" class="level-desc">Alto risco</text>
  <text x="90" y="181" text-anchor="middle" class="level-desc">Resultado variável</text>

  <!-- Arrow -->
  <path d="M 160 140 L 210 140" class="arrow"/>

  <!-- Level 2: Iniciante -->
  <rect x="210" y="80" width="140" height="120" rx="8" class="level-box level-2"/>
  <text x="280" y="100" text-anchor="middle" class="level-title">Nível 2</text>
  <text x="280" y="115" text-anchor="middle" class="level-title">Iniciante</text>
  <line x1="220" y1="125" x2="340" y2="125" stroke="#fcd34d" stroke-width="1"/>
  <text x="280" y="142" text-anchor="middle" class="level-desc">Processos definidos</text>
  <text x="280" y="155" text-anchor="middle" class="level-desc">Governança básica</text>
  <text x="280" y="168" text-anchor="middle" class="level-desc">Treinamento inicial</text>
  <text x="280" y="181" text-anchor="middle" class="level-desc">1-2 casos de uso</text>

  <!-- Arrow -->
  <path d="M 350 140 L 400 140" class="arrow"/>

  <!-- Level 3: Competente (Middle) -->
  <rect x="400" y="80" width="140" height="120" rx="8" class="level-box level-3"/>
  <text x="470" y="100" text-anchor="middle" class="level-title">Nível 3</text>
  <text x="470" y="115" text-anchor="middle" class="level-title">Competente</text>
  <line x1="410" y1="125" x2="530" y2="125" stroke="#6ee7b7" stroke-width="1"/>
  <text x="470" y="142" text-anchor="middle" class="level-desc">Operações estáveis</text>
  <text x="470" y="155" text-anchor="middle" class="level-desc">Governança sólida</text>
  <text x="470" y="168" text-anchor="middle" class="level-desc">3-5 casos em escala</text>
  <text x="470" y="181" text-anchor="middle" class="level-desc">Métricas claras</text>

  <!-- Arrow -->
  <path d="M 540 140 L 590 140" class="arrow"/>

  <!-- Level 4: Avançado -->
  <rect x="590" y="80" width="140" height="120" rx="8" class="level-box level-4"/>
  <text x="660" y="100" text-anchor="middle" class="level-title">Nível 4</text>
  <text x="660" y="115" text-anchor="middle" class="level-title">Avançado</text>
  <line x1="600" y1="125" x2="720" y2="125" stroke="#7dd3fc" stroke-width="1"/>
  <text x="660" y="142" text-anchor="middle" class="level-desc">Otimização contínua</text>
  <text x="660" y="155" text-anchor="middle" class="level-desc">Automação extensa</text>
  <text x="660" y="168" text-anchor="middle" class="level-desc">6+ soluções</text>
  <text x="660" y="181" text-anchor="middle" class="level-desc">Inovação incorporada</text>

  <!-- Details below -->
  <g id="details">
    <!-- Level 1 details -->
    <rect x="20" y="230" width="140" height="240" rx="8" fill="#fef2f2" stroke="#fca5a5" stroke-width="1"/>
    <text x="90" y="255" text-anchor="middle" style="fill: #7f1d1d; font-weight: bold; font-size: 12px;">NÍVEL 1 - AD-HOC</text>
    <line x1="30" y1="265" x2="150" y2="265" stroke="#fca5a5" stroke-width="1"/>
    
    <text x="30" y="285" style="fill: #0f172a; font-weight: 600; font-size: 11px;">Recursos:</text>
    <text x="35" y="300" class="level-desc">1-2 especialistas</text>
    <text x="35" y="312" class="level-desc">Ferramentas genéricas</text>
    
    <text x="30" y="332" style="fill: #0f172a; font-weight: 600; font-size: 11px;">Risco:</text>
    <text x="35" y="347" class="level-desc">Alto - sem controle</text>
    <text x="35" y="359" class="level-desc">Falhas frequentes</text>
    
    <text x="30" y="379" style="fill: #0f172a; font-weight: 600; font-size: 11px;">ROI:</text>
    <text x="35" y="394" class="level-desc">Variável, difícil</text>
    <text x="35" y="406" class="level-desc">de medir</text>
    
    <text x="30" y="426" style="fill: #0f172a; font-weight: 600; font-size: 11px;">Tempo para L2:</text>
    <text x="35" y="441" class="level-desc">3-6 meses</text>
    <text x="35" y="453" class="level-desc">com planejamento</text>

    <!-- Level 2 details -->
    <rect x="210" y="230" width="140" height="240" rx="8" fill="#fef3c7" stroke="#fcd34d" stroke-width="1"/>
    <text x="280" y="255" text-anchor="middle" style="fill: #713f12; font-weight: bold; font-size: 12px;">NÍVEL 2 - INICIANTE</text>
    <line x1="220" y1="265" x2="340" y2="265" stroke="#fcd34d" stroke-width="1"/>
    
    <text x="220" y="285" style="fill: #0f172a; font-weight: 600; font-size: 11px;">Recursos:</text>
    <text x="225" y="300" class="level-desc">2-3 profissionais</text>
    <text x="225" y="312" class="level-desc">Ferramentas específicas</text>
    
    <text x="220" y="332" style="fill: #0f172a; font-weight: 600; font-size: 11px;">Risco:</text>
    <text x="225" y="347" class="level-desc">Médio - governança</text>
    <text x="225" y="359" class="level-desc">em desenvolvimento</text>
    
    <text x="220" y="379" style="fill: #0f172a; font-weight: 600; font-size: 11px;">ROI:</text>
    <text x="225" y="394" class="level-desc">10-20% em 6m</text>
    <text x="225" y="406" class="level-desc">(piloto)</text>
    
    <text x="220" y="426" style="fill: #0f172a; font-weight: 600; font-size: 11px;">Tempo para L3:</text>
    <text x="225" y="441" class="level-desc">4-8 meses</text>
    <text x="225" y="453" class="level-desc">com consolidação</text>

    <!-- Level 3 details -->
    <rect x="400" y="230" width="140" height="240" rx="8" fill="#d1fae5" stroke="#6ee7b7" stroke-width="1"/>
    <text x="470" y="255" text-anchor="middle" style="fill: #065f46; font-weight: bold; font-size: 12px;">NÍVEL 3 - COMPETENTE</text>
    <line x1="410" y1="265" x2="530" y2="265" stroke="#6ee7b7" stroke-width="1"/>
    
    <text x="410" y="285" style="fill: #0f172a; font-weight: 600; font-size: 11px;">Recursos:</text>
    <text x="415" y="300" class="level-desc">5+ profissionais</text>
    <text x="415" y="312" class="level-desc">Centro de excelência</text>
    
    <text x="410" y="332" style="fill: #0f172a; font-weight: 600; font-size: 11px;">Risco:</text>
    <text x="415" y="347" class="level-desc">Baixo - governança</text>
    <text x="415" y="359" class="level-desc">estabelecida</text>
    
    <text x="410" y="379" style="fill: #0f172a; font-weight: 600; font-size: 11px;">ROI:</text>
    <text x="415" y="394" class="level-desc">25-40% anual</text>
    <text x="415" y="406" class="level-desc">(consolidado)</text>
    
    <text x="410" y="426" style="fill: #0f172a; font-weight: 600; font-size: 11px;">Tempo para L4:</text>
    <text x="415" y="441" class="level-desc">6-12 meses</text>
    <text x="415" y="453" class="level-desc">com escala</text>

    <!-- Level 4 details -->
    <rect x="590" y="230" width="140" height="240" rx="8" fill="#dbeafe" stroke="#7dd3fc" stroke-width="1"/>
    <text x="660" y="255" text-anchor="middle" style="fill: #0c4a6e; font-weight: bold; font-size: 12px;">NÍVEL 4 - AVANÇADO</text>
    <line x1="600" y1="265" x2="720" y2="265" stroke="#7dd3fc" stroke-width="1"/>
    
    <text x="600" y="285" style="fill: #0f172a; font-weight: 600; font-size: 11px;">Recursos:</text>
    <text x="605" y="300" class="level-desc">8+ especialistas</text>
    <text x="605" y="312" class="level-desc">Stack customizado</text>
    
    <text x="600" y="332" style="fill: #0f172a; font-weight: 600; font-size: 11px;">Risco:</text>
    <text x="605" y="347" class="level-desc">Muito Baixo</text>
    <text x="605" y="359" class="level-desc">Auditoria 24/7</text>
    
    <text x="600" y="379" style="fill: #0f172a; font-weight: 600; font-size: 11px;">ROI:</text>
    <text x="605" y="394" class="level-desc">40-60% anual</text>
    <text x="605" y="406" class="level-desc">(multi-área)</text>
    
    <text x="600" y="426" style="fill: #0f172a; font-weight: 600; font-size: 11px;">Horizonte:</text>
    <text x="605" y="441" class="level-desc">Líder de mercado</text>
    <text x="605" y="453" class="level-desc">em 18-24m</text>
  </g>
</svg>