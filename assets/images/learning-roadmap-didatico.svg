<svg width="1200" height="700" viewBox="0 0 1200 700" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Learning roadmap for AI administration</title>
  <desc id="desc">A didactic roadmap with four connected phases: diagnose, pilot, govern, and scale.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="700" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#E7F2FF"/>
      <stop offset="1" stop-color="#F4EEFF"/>
    </linearGradient>
    <linearGradient id="cardA" x1="0" y1="0" x2="260" y2="140" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0F6B84"/>
      <stop offset="1" stop-color="#1E8BA9"/>
    </linearGradient>
    <linearGradient id="cardB" x1="0" y1="0" x2="260" y2="140" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#2563EB"/>
      <stop offset="1" stop-color="#3B82F6"/>
    </linearGradient>
    <linearGradient id="cardC" x1="0" y1="0" x2="260" y2="140" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#7C3AED"/>
      <stop offset="1" stop-color="#A78BFA"/>
    </linearGradient>
    <filter id="shadow" x="0" y="0" width="1200" height="700" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="12" stdDeviation="12" flood-opacity="0.14"/>
    </filter>
  </defs>

  <rect width="1200" height="700" rx="36" fill="url(#bg)"/>
  <circle cx="108" cy="95" r="62" fill="#FFFFFF" fill-opacity="0.55"/>
  <circle cx="1090" cy="610" r="90" fill="#FFFFFF" fill-opacity="0.35"/>

  <g filter="url(#shadow)">
    <rect x="90" y="220" width="240" height="150" rx="20" fill="url(#cardA)"/>
    <rect x="365" y="160" width="240" height="150" rx="20" fill="url(#cardB)"/>
    <rect x="640" y="250" width="240" height="150" rx="20" fill="url(#cardC)"/>
    <rect x="915" y="190" width="240" height="150" rx="20" fill="url(#cardB)"/>
  </g>

  <g stroke="#0F172A" stroke-width="4" stroke-linecap="round" opacity="0.45">
    <path d="M330 295H365"/>
    <path d="M605 235H640"/>
    <path d="M880 295H915"/>
  </g>

  <g fill="#FFFFFF">
    <rect x="120" y="250" width="38" height="38" rx="9" fill-opacity="0.26"/>
    <rect x="395" y="190" width="38" height="38" rx="9" fill-opacity="0.26"/>
    <rect x="670" y="280" width="38" height="38" rx="9" fill-opacity="0.26"/>
    <rect x="945" y="220" width="38" height="38" rx="9" fill-opacity="0.26"/>
  </g>

  <g fill="#0F172A" opacity="0.72">
    <rect x="92" y="530" width="1016" height="70" rx="16" fill="#FFFFFF"/>
    <rect x="132" y="558" width="170" height="14" rx="7"/>
    <rect x="350" y="558" width="170" height="14" rx="7"/>
    <rect x="568" y="558" width="170" height="14" rx="7"/>
    <rect x="786" y="558" width="170" height="14" rx="7"/>
  </g>
</svg>
