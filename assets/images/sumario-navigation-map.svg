<svg width="1200" height="680" viewBox="0 0 1200 680" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Navigation map for course modules</title>
  <desc id="desc">A central hub connected to course module nodes and assessment nodes.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="680" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#F0F9FF"/>
      <stop offset="1" stop-color="#EEF2FF"/>
    </linearGradient>
    <linearGradient id="hub" x1="0" y1="0" x2="280" y2="180" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#2563EB"/>
      <stop offset="1" stop-color="#7C3AED"/>
    </linearGradient>
    <filter id="shadow" x="0" y="0" width="1200" height="680" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="10" stdDeviation="10" flood-opacity="0.16"/>
    </filter>
  </defs>

  <rect width="1200" height="680" rx="34" fill="url(#bg)"/>

  <g stroke="#64748B" stroke-width="3" stroke-linecap="round" opacity="0.55">
    <path d="M600 340L270 170"/>
    <path d="M600 340L270 340"/>
    <path d="M600 340L270 510"/>
    <path d="M600 340L930 170"/>
    <path d="M600 340L930 340"/>
    <path d="M600 340L930 510"/>
  </g>

  <g filter="url(#shadow)">
    <rect x="460" y="250" width="280" height="180" rx="26" fill="url(#hub)"/>
    <rect x="120" y="110" width="240" height="120" rx="20" fill="#FFFFFF"/>
    <rect x="120" y="280" width="240" height="120" rx="20" fill="#FFFFFF"/>
    <rect x="120" y="450" width="240" height="120" rx="20" fill="#FFFFFF"/>
    <rect x="840" y="110" width="240" height="120" rx="20" fill="#FFFFFF"/>
    <rect x="840" y="280" width="240" height="120" rx="20" fill="#FFFFFF"/>
    <rect x="840" y="450" width="240" height="120" rx="20" fill="#FFFFFF"/>
  </g>

  <g fill="#CBD5E1">
    <rect x="154" y="150" width="170" height="12" rx="6"/>
    <rect x="154" y="185" width="120" height="10" rx="5"/>
    <rect x="154" y="320" width="170" height="12" rx="6"/>
    <rect x="154" y="355" width="120" height="10" rx="5"/>
    <rect x="154" y="490" width="170" height="12" rx="6"/>
    <rect x="154" y="525" width="120" height="10" rx="5"/>
    <rect x="874" y="150" width="170" height="12" rx="6"/>
    <rect x="874" y="185" width="120" height="10" rx="5"/>
    <rect x="874" y="320" width="170" height="12" rx="6"/>
    <rect x="874" y="355" width="120" height="10" rx="5"/>
    <rect x="874" y="490" width="170" height="12" rx="6"/>
    <rect x="874" y="525" width="120" height="10" rx="5"/>
  </g>

  <g fill="#FFFFFF" opacity="0.85">
    <rect x="510" y="298" width="180" height="14" rx="7"/>
    <rect x="510" y="330" width="130" height="12" rx="6"/>
    <rect x="510" y="360" width="160" height="12" rx="6"/>
  </g>
</svg>
