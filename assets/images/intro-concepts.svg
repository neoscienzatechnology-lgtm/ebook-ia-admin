<svg width="1200" height="700" viewBox="0 0 1200 700" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .title{font:700 34px Inter,Segoe UI,sans-serif;fill:#0f172a}
      .h{font:700 17px Inter,Segoe UI,sans-serif;fill:#1e3a8a}
      .p{font:500 13px Inter,Segoe UI,sans-serif;fill:#334155}
    </style>
  </defs>
  <rect width="1200" height="700" fill="#f8fafc"/>
  <text x="600" y="60" text-anchor="middle" class="title">Conceitos essenciais de IA para negocios</text>

  <line x1="120" y1="360" x2="1080" y2="360" stroke="#cbd5e1" stroke-width="4"/>

  <circle cx="220" cy="360" r="18" fill="#2563eb"/>
  <rect x="140" y="140" width="160" height="120" rx="16" fill="#dbeafe"/>
  <text x="220" y="190" text-anchor="middle" class="h">Dados</text>
  <text x="220" y="215" text-anchor="middle" class="p">Sem dados de qualidade</text>
  <text x="220" y="235" text-anchor="middle" class="p">nao ha IA confiavel</text>
  <line x1="220" y1="260" x2="220" y2="342" stroke="#94a3b8"/>

  <circle cx="480" cy="360" r="18" fill="#2563eb"/>
  <rect x="400" y="460" width="160" height="120" rx="16" fill="#dbeafe"/>
  <text x="480" y="510" text-anchor="middle" class="h">Modelo</text>
  <text x="480" y="535" text-anchor="middle" class="p">Algoritmos aprendem</text>
  <text x="480" y="555" text-anchor="middle" class="p">padroes e previsoes</text>
  <line x1="480" y1="378" x2="480" y2="460" stroke="#94a3b8"/>

  <circle cx="740" cy="360" r="18" fill="#7c3aed"/>
  <rect x="660" y="140" width="160" height="120" rx="16" fill="#ede9fe"/>
  <text x="740" y="190" text-anchor="middle" class="h">Processo</text>
  <text x="740" y="215" text-anchor="middle" class="p">IA precisa de fluxo</text>
  <text x="740" y="235" text-anchor="middle" class="p">e governanca clara</text>
  <line x1="740" y1="260" x2="740" y2="342" stroke="#94a3b8"/>

  <circle cx="980" cy="360" r="18" fill="#7c3aed"/>
  <rect x="900" y="460" width="160" height="120" rx="16" fill="#ede9fe"/>
  <text x="980" y="510" text-anchor="middle" class="h">Resultado</text>
  <text x="980" y="535" text-anchor="middle" class="p">Impacto em custo,</text>
  <text x="980" y="555" text-anchor="middle" class="p">tempo e qualidade</text>
  <line x1="980" y1="378" x2="980" y2="460" stroke="#94a3b8"/>
</svg>
