<svg width="1200" height="700" viewBox="0 0 1200 700" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#eff6ff"/>
      <stop offset="100%" stop-color="#f5f3ff"/>
    </linearGradient>
    <linearGradient id="core" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <style>
      .title{font:700 40px Inter,Segoe UI,sans-serif;fill:#0f172a}
      .label{font:700 18px Inter,Segoe UI,sans-serif;fill:#0f172a}
      .sub{font:500 14px Inter,Segoe UI,sans-serif;fill:#334155}
    </style>
  </defs>
  <rect width="1200" height="700" fill="url(#bg)"/>
  <text x="600" y="70" text-anchor="middle" class="title">IA Aplicada a Administracao</text>

  <circle cx="600" cy="350" r="130" fill="url(#core)" opacity="0.95"/>
  <text x="600" y="340" text-anchor="middle" style="font:700 30px Inter,Segoe UI,sans-serif;fill:#fff">Curso</text>
  <text x="600" y="380" text-anchor="middle" style="font:700 34px Inter,Segoe UI,sans-serif;fill:#fff">84h</text>

  <rect x="120" y="150" width="260" height="120" rx="20" fill="#dbeafe" stroke="#93c5fd"/>
  <text x="250" y="200" text-anchor="middle" class="label">Fundamentos</text>
  <text x="250" y="225" text-anchor="middle" class="sub">Conceitos, ML e Deep Learning</text>

  <rect x="820" y="150" width="260" height="120" rx="20" fill="#ede9fe" stroke="#c4b5fd"/>
  <text x="950" y="200" text-anchor="middle" class="label">Aplicacao</text>
  <text x="950" y="225" text-anchor="middle" class="sub">RH, Marketing, Financeiro, Ops</text>

  <rect x="120" y="430" width="260" height="120" rx="20" fill="#dbeafe" stroke="#93c5fd"/>
  <text x="250" y="480" text-anchor="middle" class="label">Governanca</text>
  <text x="250" y="505" text-anchor="middle" class="sub">Etica, privacidade e riscos</text>

  <rect x="820" y="430" width="260" height="120" rx="20" fill="#ede9fe" stroke="#c4b5fd"/>
  <text x="950" y="480" text-anchor="middle" class="label">Execucao</text>
  <text x="950" y="505" text-anchor="middle" class="sub">Casos, exercicios e checklist</text>

  <path d="M380 210 L480 290" stroke="#64748b" stroke-width="3" stroke-dasharray="6 6"/>
  <path d="M820 210 L720 290" stroke="#64748b" stroke-width="3" stroke-dasharray="6 6"/>
  <path d="M380 490 L480 410" stroke="#64748b" stroke-width="3" stroke-dasharray="6 6"/>
  <path d="M820 490 L720 410" stroke="#64748b" stroke-width="3" stroke-dasharray="6 6"/>
</svg>
