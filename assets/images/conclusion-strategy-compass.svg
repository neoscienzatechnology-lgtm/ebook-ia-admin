<svg width="1200" height="700" viewBox="0 0 1200 700" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Strategic compass for AI scaling</title>
  <desc id="desc">A compass style illustration with directional priorities and milestone bars.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="700" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#EFF6FF"/>
      <stop offset="1" stop-color="#F5F3FF"/>
    </linearGradient>
    <linearGradient id="needle" x1="0" y1="0" x2="260" y2="260" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#2563EB"/>
      <stop offset="1" stop-color="#7C3AED"/>
    </linearGradient>
    <filter id="shadow" x="0" y="0" width="1200" height="700" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="12" stdDeviation="12" flood-opacity="0.16"/>
    </filter>
  </defs>

  <rect width="1200" height="700" rx="34" fill="url(#bg)"/>

  <g filter="url(#shadow)">
    <circle cx="600" cy="330" r="220" fill="#FFFFFF"/>
    <circle cx="600" cy="330" r="220" stroke="#CBD5E1" stroke-width="10"/>
    <circle cx="600" cy="330" r="28" fill="#0F172A"/>
  </g>

  <g stroke="#94A3B8" stroke-width="3" stroke-linecap="round">
    <path d="M600 96V170"/>
    <path d="M600 490V564"/>
    <path d="M366 330H292"/>
    <path d="M834 330H908"/>
  </g>

  <g>
    <path d="M600 330L708 190L640 348Z" fill="url(#needle)"/>
    <path d="M600 330L492 470L560 312Z" fill="#0EA5E9"/>
  </g>

  <g fill="#CBD5E1" opacity="0.9">
    <rect x="150" y="590" width="220" height="16" rx="8"/>
    <rect x="410" y="590" width="220" height="16" rx="8"/>
    <rect x="670" y="590" width="220" height="16" rx="8"/>
    <rect x="930" y="590" width="120" height="16" rx="8"/>
    <rect x="150" y="620" width="170" height="12" rx="6"/>
    <rect x="410" y="620" width="150" height="12" rx="6"/>
    <rect x="670" y="620" width="180" height="12" rx="6"/>
    <rect x="930" y="620" width="90" height="12" rx="6"/>
  </g>
</svg>
