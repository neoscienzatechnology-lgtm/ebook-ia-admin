<svg width="1200" height="700" viewBox="0 0 1200 700" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Implementation cycle for AI operations</title>
  <desc id="desc">A circular flow diagram with four implementation stages around a KPI core.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="700" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#F8FAFC"/>
      <stop offset="1" stop-color="#ECFEFF"/>
    </linearGradient>
    <linearGradient id="ring" x1="260" y1="90" x2="940" y2="610" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0EA5E9"/>
      <stop offset="1" stop-color="#8B5CF6"/>
    </linearGradient>
    <filter id="soft" x="0" y="0" width="1200" height="700" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="12" stdDeviation="12" flood-opacity="0.15"/>
    </filter>
  </defs>

  <rect width="1200" height="700" rx="36" fill="url(#bg)"/>

  <g filter="url(#soft)">
    <circle cx="600" cy="350" r="220" fill="#FFFFFF"/>
    <circle cx="600" cy="350" r="220" stroke="url(#ring)" stroke-width="34"/>
    <circle cx="600" cy="350" r="110" fill="#0F172A"/>
  </g>

  <g fill="#FFFFFF" opacity="0.9">
    <rect x="548" y="318" width="104" height="16" rx="8"/>
    <rect x="548" y="346" width="84" height="14" rx="7"/>
    <rect x="548" y="372" width="96" height="14" rx="7"/>
  </g>

  <g fill="#FFFFFF" opacity="0.95">
    <rect x="540" y="80" width="120" height="64" rx="16"/>
    <rect x="890" y="320" width="120" height="64" rx="16"/>
    <rect x="540" y="556" width="120" height="64" rx="16"/>
    <rect x="190" y="320" width="120" height="64" rx="16"/>
  </g>

  <g stroke="#334155" stroke-width="5" stroke-linecap="round">
    <path d="M600 144V198"/>
    <path d="M890 352H834"/>
    <path d="M600 556V502"/>
    <path d="M310 352H366"/>
  </g>

  <g fill="#64748B">
    <circle cx="600" cy="120" r="8"/>
    <circle cx="950" cy="352" r="8"/>
    <circle cx="600" cy="588" r="8"/>
    <circle cx="250" cy="352" r="8"/>
  </g>
</svg>
