<svg width="1200" height="700" viewBox="0 0 1200 700" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .title{font:700 34px Inter,Segoe UI,sans-serif;fill:#0f172a}
      .h{font:700 18px Inter,Segoe UI,sans-serif;fill:#fff}
      .p{font:500 13px Inter,Segoe UI,sans-serif;fill:#e2e8f0}
    </style>
  </defs>
  <rect width="1200" height="700" fill="#f8fafc"/>
  <text x="600" y="60" text-anchor="middle" class="title">Trilha de pratica e avaliacao</text>

  <rect x="100" y="260" width="180" height="120" rx="18" fill="#2563eb"/>
  <text x="190" y="312" text-anchor="middle" class="h">Base teorica</text>
  <text x="190" y="337" text-anchor="middle" class="p">quiz e mapa mental</text>

  <rect x="340" y="200" width="180" height="120" rx="18" fill="#7c3aed"/>
  <text x="430" y="252" text-anchor="middle" class="h">Aplicacao guiada</text>
  <text x="430" y="277" text-anchor="middle" class="p">passo a passo</text>

  <rect x="580" y="260" width="180" height="120" rx="18" fill="#2563eb"/>
  <text x="670" y="312" text-anchor="middle" class="h">Caso real</text>
  <text x="670" y="337" text-anchor="middle" class="p">tomada de decisao</text>

  <rect x="820" y="200" width="180" height="120" rx="18" fill="#7c3aed"/>
  <text x="910" y="252" text-anchor="middle" class="h">Projeto final</text>
  <text x="910" y="277" text-anchor="middle" class="p">plano 90 dias</text>

  <path d="M280 320 C315 320, 305 260, 340 260" fill="none" stroke="#64748b" stroke-width="4" marker-end="url(#ar)"/>
  <path d="M520 260 C555 260, 545 320, 580 320" fill="none" stroke="#64748b" stroke-width="4" marker-end="url(#ar)"/>
  <path d="M760 320 C795 320, 785 260, 820 260" fill="none" stroke="#64748b" stroke-width="4" marker-end="url(#ar)"/>

  <rect x="190" y="470" width="820" height="120" rx="18" fill="#eef2ff" stroke="#c7d2fe"/>
  <text x="600" y="520" text-anchor="middle" style="font:700 20px Inter,Segoe UI,sans-serif;fill:#1e3a8a">Regra de aprovacao</text>
  <text x="600" y="550" text-anchor="middle" style="font:500 15px Inter,Segoe UI,sans-serif;fill:#334155">Acerto tecnico + clareza executiva + etica + viabilidade operacional</text>

  <defs>
    <marker id="ar" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0,10 3,0 6" fill="#64748b"/>
    </marker>
  </defs>
</svg>
