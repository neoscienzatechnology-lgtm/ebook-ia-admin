<svg width="1200" height="700" viewBox="0 0 1200 700" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .title{font:700 34px Inter,Segoe UI,sans-serif;fill:#0f172a}
      .h{font:700 20px Inter,Segoe UI,sans-serif;fill:#fff}
      .p{font:500 14px Inter,Segoe UI,sans-serif;fill:#e2e8f0}
    </style>
  </defs>
  <rect width="1200" height="700" fill="#f8fafc"/>
  <text x="600" y="60" text-anchor="middle" class="title">Stack de ferramentas de IA para administracao</text>

  <rect x="180" y="120" width="840" height="100" rx="18" fill="#1d4ed8"/>
  <text x="600" y="160" text-anchor="middle" class="h">Camada 1: Interface e colaboracao</text>
  <text x="600" y="190" text-anchor="middle" class="p">Chat corporativo, wiki, central de pedidos e dashboards</text>

  <rect x="220" y="250" width="760" height="100" rx="18" fill="#2563eb"/>
  <text x="600" y="290" text-anchor="middle" class="h">Camada 2: Orquestracao</text>
  <text x="600" y="320" text-anchor="middle" class="p">Automacao de fluxo, regras de negocio e APIs internas</text>

  <rect x="260" y="380" width="680" height="100" rx="18" fill="#7c3aed"/>
  <text x="600" y="420" text-anchor="middle" class="h">Camada 3: Modelos de IA</text>
  <text x="600" y="450" text-anchor="middle" class="p">Modelos generativos, classificadores, previsao e recomendacao</text>

  <rect x="300" y="510" width="600" height="100" rx="18" fill="#6d28d9"/>
  <text x="600" y="550" text-anchor="middle" class="h">Camada 4: Dados e governanca</text>
  <text x="600" y="580" text-anchor="middle" class="p">Qualidade de dados, seguranca, auditoria e conformidade</text>
</svg>
