<svg width="1200" height="700" viewBox="0 0 1200 700" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .title{font:700 34px Inter,Segoe UI,sans-serif;fill:#0f172a}
      .h{font:700 20px Inter,Segoe UI,sans-serif;fill:#1e293b}
      .p{font:500 13px Inter,Segoe UI,sans-serif;fill:#475569}
    </style>
  </defs>
  <rect width="1200" height="700" fill="#f8fafc"/>
  <text x="600" y="60" text-anchor="middle" class="title">Painel de metricas para casos de IA</text>

  <rect x="90" y="120" width="1020" height="500" rx="24" fill="#ffffff" stroke="#e2e8f0"/>

  <rect x="150" y="180" width="220" height="130" rx="16" fill="#dbeafe"/>
  <text x="260" y="235" text-anchor="middle" class="h">SLA</text>
  <text x="260" y="265" text-anchor="middle" class="p">-32% no tempo medio</text>

  <rect x="410" y="180" width="220" height="130" rx="16" fill="#ede9fe"/>
  <text x="520" y="235" text-anchor="middle" class="h">Retrabalho</text>
  <text x="520" y="265" text-anchor="middle" class="p">-27% em erros operacionais</text>

  <rect x="670" y="180" width="220" height="130" rx="16" fill="#dbeafe"/>
  <text x="780" y="235" text-anchor="middle" class="h">Custo</text>
  <text x="780" y="265" text-anchor="middle" class="p">-18% por processo</text>

  <rect x="930" y="180" width="120" height="130" rx="16" fill="#ede9fe"/>
  <text x="990" y="235" text-anchor="middle" class="h">NPS</text>
  <text x="990" y="265" text-anchor="middle" class="p">+11 pts</text>

  <polyline points="170,500 300,430 430,450 560,360 690,380 820,300 950,280" fill="none" stroke="#2563eb" stroke-width="6"/>
  <circle cx="300" cy="430" r="8" fill="#2563eb"/>
  <circle cx="560" cy="360" r="8" fill="#2563eb"/>
  <circle cx="820" cy="300" r="8" fill="#2563eb"/>
  <text x="170" y="540" class="p">Semana 1</text>
  <text x="430" y="540" class="p">Semana 4</text>
  <text x="690" y="540" class="p">Semana 8</text>
  <text x="950" y="540" class="p">Semana 12</text>
</svg>
