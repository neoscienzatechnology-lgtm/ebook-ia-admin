<svg width="1200" height="700" viewBox="0 0 1200 700" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .title{font:700 34px Inter,Segoe UI,sans-serif;fill:#0f172a}
      .h{font:700 20px Inter,Segoe UI,sans-serif;fill:#ffffff}
      .p{font:500 13px Inter,Segoe UI,sans-serif;fill:#e2e8f0}
    </style>
  </defs>
  <rect width="1200" height="700" fill="#f8fafc"/>
  <text x="600" y="60" text-anchor="middle" class="title">Matriz de Avaliacao Avancada - Nivel Pos-Graduacao</text>

  <rect x="120" y="130" width="960" height="120" rx="16" fill="#1d4ed8"/>
  <text x="600" y="180" text-anchor="middle" class="h">Fundamentacao teorica e rigor metodologico</text>
  <text x="600" y="210" text-anchor="middle" class="p">Coerencia conceitual, hipoteses e criterio de evidencia</text>

  <rect x="120" y="270" width="960" height="120" rx="16" fill="#2563eb"/>
  <text x="600" y="320" text-anchor="middle" class="h">Aplicabilidade executiva e impacto financeiro</text>
  <text x="600" y="350" text-anchor="middle" class="p">Viabilidade de implementacao, ROI e risco operacional</text>

  <rect x="120" y="410" width="960" height="120" rx="16" fill="#7c3aed"/>
  <text x="600" y="460" text-anchor="middle" class="h">Governanca, etica e conformidade</text>
  <text x="600" y="490" text-anchor="middle" class="p">Privacidade, vies, accountability e trilha de auditoria</text>

  <rect x="120" y="550" width="960" height="100" rx="16" fill="#6d28d9"/>
  <text x="600" y="595" text-anchor="middle" class="h">Comunicacao academica e defesa oral</text>
  <text x="600" y="624" text-anchor="middle" class="p">Argumentacao, clareza e capacidade de sustentacao critica</text>
</svg>
