<svg width="1200" height="700" viewBox="0 0 1200 700" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#eef6ff"/>
      <stop offset="100%" stop-color="#f5f3ff"/>
    </linearGradient>
    <style>
      .title{font:700 34px Inter,Segoe UI,sans-serif;fill:#0f172a}
      .h{font:700 18px Inter,Segoe UI,sans-serif;fill:#1e293b}
      .p{font:500 13px Inter,Segoe UI,sans-serif;fill:#475569}
    </style>
  </defs>
  <rect width="1200" height="700" fill="url(#bg)"/>
  <text x="600" y="58" text-anchor="middle" class="title">Framework de Pesquisa Aplicada em IA Administrativa</text>

  <rect x="70" y="160" width="240" height="130" rx="16" fill="#dbeafe" stroke="#93c5fd"/>
  <text x="190" y="212" text-anchor="middle" class="h">Pergunta de pesquisa</text>
  <text x="190" y="238" text-anchor="middle" class="p">Hipotese de impacto</text>

  <rect x="340" y="160" width="240" height="130" rx="16" fill="#ede9fe" stroke="#c4b5fd"/>
  <text x="460" y="212" text-anchor="middle" class="h">Desenho metodologico</text>
  <text x="460" y="238" text-anchor="middle" class="p">Quasi experimento</text>

  <rect x="610" y="160" width="240" height="130" rx="16" fill="#dbeafe" stroke="#93c5fd"/>
  <text x="730" y="212" text-anchor="middle" class="h">Coleta de dados</text>
  <text x="730" y="238" text-anchor="middle" class="p">Baseline vs piloto</text>

  <rect x="880" y="160" width="240" height="130" rx="16" fill="#ede9fe" stroke="#c4b5fd"/>
  <text x="1000" y="212" text-anchor="middle" class="h">Inferencia causal</text>
  <text x="1000" y="238" text-anchor="middle" class="p">Controle de vieses</text>

  <rect x="180" y="390" width="280" height="170" rx="16" fill="#ffffff" stroke="#cbd5e1"/>
  <text x="320" y="440" text-anchor="middle" class="h">Metricas primarias</text>
  <text x="320" y="468" text-anchor="middle" class="p">Tempo de ciclo</text>
  <text x="320" y="492" text-anchor="middle" class="p">Erro operacional</text>
  <text x="320" y="516" text-anchor="middle" class="p">Custo por processo</text>

  <rect x="520" y="390" width="280" height="170" rx="16" fill="#ffffff" stroke="#cbd5e1"/>
  <text x="660" y="440" text-anchor="middle" class="h">Metricas secundarias</text>
  <text x="660" y="468" text-anchor="middle" class="p">Satisfacao interna</text>
  <text x="660" y="492" text-anchor="middle" class="p">Conformidade</text>
  <text x="660" y="516" text-anchor="middle" class="p">Aderencia ao SLA</text>

  <rect x="860" y="390" width="240" height="170" rx="16" fill="#1e3a8a"/>
  <text x="980" y="444" text-anchor="middle" style="font:700 20px Inter,Segoe UI,sans-serif;fill:#ffffff">Decisao</text>
  <text x="980" y="476" text-anchor="middle" style="font:500 14px Inter,Segoe UI,sans-serif;fill:#dbeafe">Escalar, ajustar</text>
  <text x="980" y="500" text-anchor="middle" style="font:500 14px Inter,Segoe UI,sans-serif;fill:#dbeafe">ou encerrar piloto</text>

  <path d="M310 225 L340 225" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M580 225 L610 225" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M850 225 L880 225" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>

  <path d="M730 290 L730 355" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M730 355 L320 355 L320 390" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M730 355 L660 355 L660 390" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M730 355 L980 355 L980 390" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0,10 3,0 6" fill="#64748b"/>
    </marker>
  </defs>
</svg>
